name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json
          coverage: none

      - name: PHP syntax check
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 -P4 php -l

      - name: Run test suite
        run: php tests/run.php
